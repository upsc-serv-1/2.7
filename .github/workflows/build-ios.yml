name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Expo Prebuild (generate iOS native project)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Detect Xcode scheme
        id: scheme
        run: |
          cd ios
          SCHEME=$(xcodebuild -workspace *.xcworkspace -list -json | python3 -c "import sys,json;print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "name=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected scheme: $SCHEME"

      - name: Build unsigned archive
        run: |
          cd ios
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package as unsigned IPA
        run: |
          cd frontend/ios/build
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/*.app Payload/
          zip -qr unsigned-app.ipa Payload
          ls -lah unsigned-app.ipa
        working-directory: ${{ github.workspace }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: frontend/ios/build/unsigned-app.ipa
          retention-days: 7
